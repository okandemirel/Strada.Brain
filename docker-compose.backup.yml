version: '3.8'

# Backup Service for Strata.Brain
# Handles automated backups with S3/MinIO integration

services:
  # Main backup service
  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: strata-brain-backup
    restart: unless-stopped
    environment:
      # Backup Configuration
      - BACKUP_DIR=/backups
      - RETENTION_DAYS=30
      - KEEP_COUNT=30
      
      # Schedule (cron format)
      - BACKUP_SCHEDULE=0 2 * * *
      
      # S3/MinIO Configuration
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-}
      
      # MinIO specific
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_BUCKET=${MINIO_BUCKET:-strata-backups}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-true}
      
      # Notification Webhooks
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      
      # Alerting
      - ALERT_ON_SUCCESS=${ALERT_ON_SUCCESS:-false}
      - ALERT_ON_FAILURE=${ALERT_ON_FAILURE:-true}
      
    volumes:
      # Backup storage
      - backup-data:/backups
      
      # Mount strata-memory for backup
      - type: bind
        source: ./.strata-memory
        target: /app/.strata-memory
        read_only: true
      
      # Mount config files
      - type: bind
        source: ./.env.example
        target: /app/.env.example
        read_only: true
      - type: bind
        source: ./package.json
        target: /app/package.json
        read_only: true
      - type: bind
        source: ./tsconfig.json
        target: /app/tsconfig.json
        read_only: true
      
      # Scripts
      - type: bind
        source: ./scripts/backup.sh
        target: /app/backup.sh
        read_only: true
      
      # Logs
      - backup-logs:/var/log/backup
    
    networks:
      - backup-network
    
    healthcheck:
      test: ["CMD", "pgrep", "-f", "backup-scheduler"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO for local S3-compatible storage (optional)
  minio:
    image: minio/minio:latest
    container_name: strata-brain-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - backup-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - minio

  # Create MinIO bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: strata-brain-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 10 &&
        mc config host add local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb local/strata-backups --ignore-existing &&
        mc version enable local/strata-backups
      "
    networks:
      - backup-network
    profiles:
      - minio

  # Backup verification service
  backup-verifier:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: strata-brain-backup-verifier
    restart: unless-stopped
    environment:
      - BACKUP_DIR=/backups
      - VERIFY_SCHEDULE=0 6 * * *
    volumes:
      - backup-data:/backups:ro
      - backup-logs:/var/log/backup
    command: >
      sh -c "
        echo 'Backup verifier started' &&
        while true; do
          sleep 3600
        done
      "
    networks:
      - backup-network
    profiles:
      - verifier

  # Prometheus metrics exporter for backups
  backup-metrics:
    image: prom/node-exporter:latest
    container_name: strata-brain-backup-metrics
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
      - backup-data:/backups:ro
    networks:
      - backup-network
    profiles:
      - metrics

volumes:
  backup-data:
    driver: local
  backup-logs:
    driver: local
  minio-data:
    driver: local

networks:
  backup-network:
    driver: bridge
