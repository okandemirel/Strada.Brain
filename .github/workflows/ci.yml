name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install portal dependencies
        run: npm ci --prefix web-portal

      - name: Clone Strada.Core reference
        run: git clone --depth 1 https://github.com/okandemirel/Strada.Core.git /tmp/Strada.Core-ci

      - name: Validate Strada.Core drift
        run: npm run sync:check -- --core-path /tmp/Strada.Core-ci --max-drift-score 0

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          CI: "1"
        run: npm test

      - name: Portal Tests
        run: npm run test:portal

      - name: Build
        run: npm run build
