name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install portal dependencies
        run: npm ci --prefix web-portal

      - name: Clone Strada.Core reference
        run: git clone --depth 1 https://github.com/okandemirel/Strada.Core.git /tmp/Strada.Core-ci

      - name: Validate Strada.Core extraction
        run: npm run sync:check -- --core-path /tmp/Strada.Core-ci

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          CI: "1"
        run: npm test

      - name: Dashboard Live Tests
        env:
          LOCAL_SERVER_TESTS: "1"
        run: npm test -- src/dashboard/prometheus.test.ts src/dashboard/websocket-server.test.ts

      - name: Setup and Boot Truthfulness
        run: npm test -- src/core/setup-wizard.test.ts src/core/terminal-wizard.test.ts src/core/setup-doctor.test.ts src/core/boot-report.test.ts src/dashboard/server.test.ts src/tests/unit/package-script-contract.test.ts

      - name: Portal Tests
        run: npm run test:portal

      - name: Build
        run: npm run build

  windows-verify:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install portal dependencies
        run: npm ci --prefix web-portal

      - name: Typecheck
        run: npm run typecheck:src

      - name: Windows launcher and setup tests
        run: npm exec vitest run src/tests/integration/source-launcher.test.ts src/common/runtime-paths.test.ts src/core/setup-doctor.test.ts src/core/terminal-wizard.test.ts

      - name: Build
        run: npm run build
