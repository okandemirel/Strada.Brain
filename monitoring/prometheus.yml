# =============================================================================
# Prometheus Configuration for Strada.Brain
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'strada-brain'
    replica: '{{.ExternalURL}}'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # Strada.Brain metrics
  - job_name: 'strada-brain'
    static_configs:
      - targets: ['strada-brain:9090']
        labels:
          instance: 'strada-brain'
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis exporter (if enabled)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics
    scrape_interval: 30s

  # Nginx exporter (if enabled)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
    metrics_path: /metrics
    scrape_interval: 30s

  # Node exporter (host metrics) - if running externally
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
