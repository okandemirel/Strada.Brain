# Docker Compose with Security Hardening
# 
# Usage:
#   docker-compose -f docker-compose.security.yml up -d

version: "3.8"

services:
  strata-brain:
    build:
      context: ..
      dockerfile: docker/Dockerfile.hardened
      target: production
    image: strata-brain:hardened
    container_name: strata-brain-secure
    
    # Security options
    read_only: true
    user: "1001:1001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Restart policy
    restart: unless-stopped
    
    # Environment
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - READ_ONLY_MODE=true
      - SHELL_ENABLED=false
      - RATE_LIMIT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    
    # Ports
    ports:
      - "3000:3000"
    
    # Temporary filesystems
    tmpfs:
      - /app/tmp:noexec,nosuid,size=100m,uid=1001,gid=1001
      - /tmp:noexec,nosuid,size=100m
    
    # Read-write volumes (for persistent data)
    volumes:
      - type: volume
        source: strata-data
        target: /app/data
      - type: volume
        source: strata-logs
        target: /app/logs
    
    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,environment"
    
    # Networks
    networks:
      - strata-network

  # Security scanner (optional)
  security-scanner:
    image: aquasec/trivy:latest
    container_name: strata-security-scanner
    command: [
      "image",
      "--exit-code", "0",
      "--severity", "HIGH,CRITICAL",
      "strata-brain:hardened"
    ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - strata-network
    depends_on:
      - strata-brain
    profiles:
      - scan

volumes:
  strata-data:
    driver: local
  strata-logs:
    driver: local

networks:
  strata-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
    driver_opts:
      com.docker.network.bridge.name: strata-net
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.enable_icc: "false"
