# =============================================================================
# Strada.Brain - Nginx Reverse Proxy Configuration
# =============================================================================
# Features:
#   - Reverse proxy to Strada.Brain dashboard
#   - SSL/TLS termination
#   - Rate limiting
#   - WebSocket upgrade support
#   - Security headers
#   - Gzip compression
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # =============================================================================
    # Logging Format
    # =============================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # =============================================================================
    # Performance
    # =============================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # =============================================================================
    # Rate Limiting Zones
    # =============================================================================
    # General API rate limit: 100 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    
    # Stricter rate limit for sensitive endpoints: 10 requests per minute
    limit_req_zone $binary_remote_addr zone=strict:10m rate=10r/m;
    
    # Connection limiting: 10 concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # =============================================================================
    # Upstream Backend
    # =============================================================================
    upstream strata_backend {
        least_conn;
        server strada-brain:3100 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream prometheus_backend {
        server strada-brain:9090 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # =============================================================================
    # Server Block - HTTP (Redirect to HTTPS)
    # =============================================================================
    server {
        listen 80;
        server_name _;
        
        # Health check endpoint (no redirect)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =============================================================================
    # Server Block - HTTPS
    # =============================================================================
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # Modern SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        
        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # =============================================================================
        # Security Headers
        # =============================================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:;" always;
        
        # HSTS (uncomment for production with valid SSL)
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # =============================================================================
        # Connection Limits
        # =============================================================================
        limit_conn conn 10;

        # =============================================================================
        # Dashboard - Main Application
        # =============================================================================
        location / {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://strata_backend;
            proxy_http_version 1.1;
            
            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            
            # Error handling
            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        # =============================================================================
        # Health Check (Nginx level)
        # =============================================================================
        location /nginx-health {
            access_log off;
            return 200 "nginx-healthy\n";
            add_header Content-Type text/plain;
        }

        # =============================================================================
        # API Endpoints
        # =============================================================================
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://strata_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # =============================================================================
        # Metrics Endpoint (Internal only - restrict access in production)
        # =============================================================================
        location /metrics {
            # Allow only specific IPs (configure as needed)
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # allow 192.168.0.0/16;
            # deny all;
            
            proxy_pass http://prometheus_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Shorter timeouts for metrics
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        # =============================================================================
        # WebSocket Endpoint
        # =============================================================================
        location /ws {
            limit_req zone=api burst=10 nodelay;
            
            proxy_pass http://strata_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket specific
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Longer timeouts for WebSocket
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            
            # Disable buffering for real-time
            proxy_buffering off;
        }

        # =============================================================================
        # Static Files (if serving directly)
        # =============================================================================
        location /static/ {
            alias /var/www/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # =============================================================================
        # Error Pages
        # =============================================================================
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # =============================================================================
    # Stream Block (for TCP/UDP proxying if needed)
    # =============================================================================
    # stream {
    #     upstream bot_backend {
    #         server strada-brain:8080;
    #     }
    #     
    #     server {
    #         listen 8080;
    #         proxy_pass bot_backend;
    #     }
    # }
}
